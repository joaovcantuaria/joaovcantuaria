<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Entrega de Fotos - Joao Vitor Cantuaria</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&family=Playfair+Display:wght@400;500;600;700&family=Montserrat:wght@100;200;300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --gold: #C6A972;
            --gold-dark: #a8884e;
            --black: #0a0a0a;
            --black-soft: #111111;
            --black-card: #161616;
            --white: #ffffff;
            --white-dim: rgba(255,255,255,0.65);
            --border: rgba(198,169,114,0.18);
            --font-body: 'DM Sans', sans-serif;
            --font-heading: 'Playfair Display', serif;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: var(--font-body);
            background: var(--black);
            color: var(--white);
            line-height: 1.6;
            -webkit-font-smoothing: antialiased;
        }

        /* HERO / CAPA */
        .hero-cover {
            position: relative;
            width: 100%;
            height: 85vh;
            min-height: 500px;
            overflow: hidden;
        }

        .hero-cover img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            object-position: center;
        }

        .hero-gradient {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            height: 60%;
            background: linear-gradient(to top, var(--black) 0%, rgba(10,10,10,0.7) 40%, transparent 100%);
        }

        .hero-top-gradient {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 20%;
            background: linear-gradient(to bottom, rgba(10,10,10,0.5) 0%, transparent 100%);
        }

        .hero-content {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            padding: 3rem;
            text-align: center;
        }

        .hero-brand {
            font-size: 0.65rem;
            letter-spacing: 0.35em;
            text-transform: uppercase;
            color: var(--gold);
            margin-bottom: 1.5rem;
            font-weight: 500;
        }

        .hero-title {
            font-family: var(--font-heading);
            font-size: clamp(2rem, 5vw, 3.5rem);
            font-weight: 400;
            line-height: 1.2;
            margin-bottom: 0.5rem;
        }

        .hero-date {
            font-size: 0.85rem;
            color: var(--white-dim);
            font-weight: 300;
        }
</style>
</head>
<body>
    <!-- Loading -->
    <div id="loadingScreen" style="position:fixed;inset:0;background:var(--black);display:flex;align-items:center;justify-content:center;z-index:9999;">
        <div style="text-align:center;">
            <i class="fas fa-camera" style="font-size:2rem;color:var(--gold);margin-bottom:1rem;display:block;"></i>
            <p style="color:var(--white-dim);font-size:0.85rem;">Carregando suas fotos...</p>
        </div>
    </div>

    <!-- Main Content -->
    <div id="mainContent" style="display:none;">
        <!-- Hero Cover -->
        <section class="hero-cover">
            <img id="coverImage" src="" alt="Capa">
            <div class="hero-top-gradient"></div>
            <div class="hero-gradient"></div>
            <div class="hero-content">
                <p class="hero-brand">Joao Vitor Cantuaria · Fotografia</p>
                <h1 class="hero-title" id="clienteName"></h1>
                <p class="hero-date" id="entregaDate"></p>
            </div>
        </section>

        <!-- Story Section -->
        <section id="storySection" style="display:none;"></section>

        <!-- Gallery -->
        <section id="gallerySection"></section>

        <!-- Footer -->
        <footer style="text-align:center;padding:4rem 2rem 3rem;border-top:1px solid rgba(198,169,114,0.1);">
            <p style="font-size:0.72rem;letter-spacing:0.3em;text-transform:uppercase;color:var(--gold);margin-bottom:0.5rem;">Joao Vitor Cantuaria</p>
            <p style="font-size:0.8rem;color:var(--white-dim);font-weight:300;">Fotografia · Comunicacao · Publicidade</p>
        </footer>
    </div>

    <!-- Error -->
    <div id="errorScreen" style="display:none;position:fixed;inset:0;background:var(--black);display:none;align-items:center;justify-content:center;">
        <div style="text-align:center;padding:2rem;">
            <i class="fas fa-exclamation-circle" style="font-size:2.5rem;color:var(--gold);margin-bottom:1.5rem;display:block;"></i>
            <h2 style="font-family:var(--font-heading);font-size:1.5rem;font-weight:400;margin-bottom:0.5rem;">Entrega nao encontrada</h2>
            <p style="color:var(--white-dim);font-size:0.9rem;">O link pode estar incorreto ou a entrega foi removida.</p>
            <a href="../index.html" style="display:inline-block;margin-top:2rem;color:var(--gold);text-decoration:none;font-size:0.8rem;letter-spacing:0.1em;text-transform:uppercase;border:1px solid var(--border);padding:0.7rem 1.5rem;transition:all 0.3s;">Voltar ao Site</a>
        </div>
    </div>

    <!-- Lightbox -->
    <div id="lightbox" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,0.95);z-index:10000;align-items:center;justify-content:center;padding:1rem;">
        <button onclick="closeLightbox()" style="position:absolute;top:1.5rem;right:1.5rem;background:none;border:none;color:var(--gold);font-size:1.5rem;cursor:pointer;z-index:2;"><i class="fas fa-times"></i></button>
        <img id="lightboxImg" src="" alt="" style="max-width:95%;max-height:90vh;object-fit:contain;">
        <a id="lightboxDownload" href="" download style="position:absolute;bottom:1.5rem;left:50%;transform:translateX(-50%);background:var(--gold);color:var(--black);padding:0.6rem 1.5rem;text-decoration:none;font-size:0.72rem;font-weight:700;letter-spacing:0.12em;text-transform:uppercase;"><i class="fas fa-download"></i> Download</a>
    </div>

    <script>
        const SUPABASE_URL = 'https://gzetvnqnqmjrkcfsjxyk.supabase.co';
        const SUPABASE_KEY = 'sb_publishable_i5bIlH9xOl7Oeh3MEVnuXg_F7Zp3aZ5';
        const CLOUD_NAME = 'cpfik4th';

        const params = new URLSearchParams(window.location.search);
        const entregaId = params.get('id');

        if (!entregaId) { showError(); }
        else { loadEntrega(); }

        async function loadEntrega() {
            try {
                const res = await fetch(
                    `${SUPABASE_URL}/rest/v1/entregas?codigo=eq.${entregaId}&select=*`,
                    { headers: { 'apikey': SUPABASE_KEY, 'Authorization': `Bearer ${SUPABASE_KEY}` } }
                );
                const data = await res.json();

                if (!data || data.length === 0) { showError(); return; }

                const entrega = data[0];
                renderEntrega(entrega);

            } catch (err) {
                console.error(err);
                showError();
            }
        }

        function renderEntrega(e) {
            // Cover
            const coverUrl = `https://res.cloudinary.com/${CLOUD_NAME}/image/upload/w_1920,q_85/${e.capa_url}.jpg`;
            document.getElementById('coverImage').src = coverUrl;
            document.getElementById('clienteName').textContent = e.cliente_nome;
            document.getElementById('entregaDate').textContent = new Date(e.created_at).toLocaleDateString('pt-BR', { day: 'numeric', month: 'long', year: 'numeric' });

            document.title = `${e.cliente_nome} - Entrega de Fotos`;

            // Story
            if (e.historia) {
                const storySection = document.getElementById('storySection');
                storySection.style.display = 'block';
                storySection.innerHTML = `
                    <div style="max-width:700px;margin:0 auto;padding:5rem 2rem;text-align:center;">
                        <div style="width:40px;height:1px;background:linear-gradient(90deg,transparent,var(--gold),transparent);margin:0 auto 2rem;"></div>
                        <p style="font-size:0.7rem;letter-spacing:0.3em;text-transform:uppercase;color:var(--gold);margin-bottom:1.5rem;font-weight:500;">Sobre este ensaio</p>
                        <p style="font-size:1.05rem;line-height:2;color:var(--white-dim);font-weight:300;">${e.historia}</p>
                    </div>
                `;
            }

            // Gallery
            const fotos = e.fotos || [];
            const gallerySection = document.getElementById('gallerySection');
            gallerySection.innerHTML = `
                <div style="padding:3rem 2rem 5rem;max-width:1200px;margin:0 auto;">
                    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:2rem;flex-wrap:wrap;gap:1rem;">
                        <div>
                            <p style="font-size:0.7rem;letter-spacing:0.3em;text-transform:uppercase;color:var(--gold);font-weight:500;">Suas Fotos</p>
                            <p style="font-size:0.85rem;color:var(--white-dim);margin-top:0.3rem;">${fotos.length} foto${fotos.length!==1?'s':''} disponiveis para download</p>
                        </div>
                        <button onclick="downloadAll()" style="background:var(--gold);color:var(--black);border:none;padding:0.7rem 1.5rem;font-family:var(--font-body);font-size:0.72rem;font-weight:700;letter-spacing:0.12em;text-transform:uppercase;cursor:pointer;transition:all 0.3s;">
                            <i class="fas fa-download"></i> Baixar Album Completo
                        </button>
                    </div>
                    <div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:6px;" id="photosGrid">
                        ${fotos.map((f, i) => {
                            const thumb = `https://res.cloudinary.com/${CLOUD_NAME}/image/upload/w_600,q_75/${f}.jpg`;
                            const full = `https://res.cloudinary.com/${CLOUD_NAME}/image/upload/q_90/${f}.jpg`;
                            const dl = `https://res.cloudinary.com/${CLOUD_NAME}/image/upload/fl_attachment/${f}.jpg`;
                            return `<div style="position:relative;aspect-ratio:4/3;overflow:hidden;background:#161616;cursor:pointer;" onclick="openLightbox('${full}','${dl}')">
                                <img src="${thumb}" alt="Foto ${i+1}" loading="lazy" style="width:100%;height:100%;object-fit:cover;transition:transform 0.4s;">
                                <div style="position:absolute;inset:0;background:rgba(10,10,10,0.6);opacity:0;transition:opacity 0.3s;display:flex;align-items:center;justify-content:center;gap:1rem;" onmouseenter="this.style.opacity=1" onmouseleave="this.style.opacity=0">
                                    <span style="color:var(--white);font-size:1.2rem;"><i class="fas fa-expand"></i></span>
                                    <a href="${dl}" download onclick="event.stopPropagation()" style="color:var(--gold);font-size:1.2rem;text-decoration:none;"><i class="fas fa-download"></i></a>
                                </div>
                            </div>`;
                        }).join('')}
                    </div>
                </div>
            `;

            // Store fotos for download all
            window._entregaFotos = fotos;

            // Hide loading, show content
            document.getElementById('loadingScreen').style.display = 'none';
            document.getElementById('mainContent').style.display = 'block';
        }

        function showError() {
            document.getElementById('loadingScreen').style.display = 'none';
            const errEl = document.getElementById('errorScreen');
            errEl.style.display = 'flex';
        }

        // Lightbox
        function openLightbox(src, dl) {
            document.getElementById('lightboxImg').src = src;
            document.getElementById('lightboxDownload').href = dl;
            document.getElementById('lightbox').style.display = 'flex';
            document.body.style.overflow = 'hidden';
        }

        function closeLightbox() {
            document.getElementById('lightbox').style.display = 'none';
            document.body.style.overflow = '';
        }

        document.getElementById('lightbox').addEventListener('click', (e) => {
            if (e.target === e.currentTarget) closeLightbox();
        });

        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape') closeLightbox();
        });

        // Download All - abre cada foto pra download
        async function downloadAll() {
            const fotos = window._entregaFotos || [];
            if (fotos.length === 0) return;

            // Usar a API de download do Cloudinary - gera zip
            // Cloudinary permite gerar zip via URL especial
            const tag = fotos[0].split('/')[0]; // pegar a pasta/tag
            
            // Metodo alternativo: download sequencial
            const confirmed = confirm(`Iniciar download de ${fotos.length} fotos?\n\nAs fotos serao baixadas uma a uma.`);
            if (!confirmed) return;

            for (let i = 0; i < fotos.length; i++) {
                const url = `https://res.cloudinary.com/${CLOUD_NAME}/image/upload/fl_attachment/${fotos[i]}.jpg`;
                const link = document.createElement('a');
                link.href = url;
                link.download = `foto_${i+1}.jpg`;
                link.style.display = 'none';
                document.body.appendChild(link);
                link.click();
                document.body.removeChild(link);
                // Esperar um pouco entre downloads pra nao sobrecarregar
                await new Promise(r => setTimeout(r, 500));
            }
        }
    </script>
</body>
</html>
